<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agrovet Manager – Business Management System</title>
  <meta name="description" content="Agrovet Business Management System – Inventory, Sales, Expenses & Reports" />

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <!-- React + ReactDOM (production CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (transpiles JSX in-browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a3a2a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Agrofeeds">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Lato', 'Segoe UI', sans-serif;
      background: #f0f4f0;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    /* Print styles */
    @media print {
      aside, nav, .no-print { display: none !important; }
      main { margin-left: 0 !important; }
      body { background: #fff; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f1f1; }
    ::-webkit-scrollbar-thumb { background: #c8e6c9; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #4caf50; }

    /* Loading screen */
    #loading {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #e8f5e9 0%, #f1f8e9 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Lato', sans-serif; z-index: 9999;
    }
    #loading .emoji { font-size: 48px; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
    #loading h1 { font-size: 22px; font-weight: 800; color: #1a3a2a; margin: 0 0 8px; }
    #loading p { font-size: 13px; color: #666; margin: 0; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

    /* ============================================================
   MOBILE RESPONSIVE — screens < 768px
   ============================================================ */

    /* Smooth transitions */
    #mobile-nav, #main-content, #topbar { transition: all 0.25s ease; }

    /* ── Bottom nav on mobile ── */
    @media (max-width: 768px) {

      /* Outer layout: stack vertically */
      div#root > div[style] {
        flex-direction: column !important;
      }

      /* Sidebar becomes bottom navbar */
      #mobile-nav {
        width: 100% !important;
        height: 60px !important;
        position: fixed !important;
        bottom: 0 !important;
        top: auto !important;
        left: 0 !important;
        right: 0 !important;
        flex-direction: row !important;
        z-index: 200 !important;
        overflow: hidden !important;
      }

      /* Hide the logo/business name section on mobile */
      #mobile-nav > div:first-child {
        display: none !important;
      }

      /* Hide the user profile/logout section on mobile */
      #mobile-nav > div:last-child {
        display: none !important;
      }

      /* Nav becomes horizontal row */
      #mobile-nav nav {
        flex: 1 !important;
        display: flex !important;
        flex-direction: row !important;
        padding: 0 !important;
        overflow-x: auto !important;
        align-items: stretch !important;
      }

      /* Each nav button */
      #mobile-nav nav button  {
        flex: 1 !important;
        flex-direction: column !important;
        padding: 6px 4px !important;
        gap: 3px !important;
        font-size: 10px !important;
        border-left: none !important;
        border-top: 3px solid transparent !important;
        min-width: 52px !important;
        justify-content: center !important;
        align-items: center !important;
      }

      /* Active tab indicator on top instead of left */
      #mobile-nav nav button[style*="3px solid #4caf50"] {
        border-left: none !important;
        border-top: 3px solid #4caf50 !important;
      }

      /* Badge on inventory tab */
      #mobile-nav nav button span {
        margin-left: 0 !important;
        position: absolute !important;
        top: 4px !important;
        right: 4px !important;
        font-size: 9px !important;
      }

      /* Main content: full width, bottom padding for navbar */
      #main-content {
        margin-left: 0 !important;
        padding-bottom: 70px !important;
        width: 100% !important;
      }

      /* Topbar */
      #main-content > div:first-child {
        padding: 10px 14px !important;
      }

      /* Page content padding */
      #main-content > div:last-child {
        padding: 14px !important;
      }

      /* Toast notification */
      div[style*="position:'fixed'"][style*="top:20"] {
        top: 10px !important;
        right: 10px !important;
        left: 10px !important;
        font-size: 12px !important;
      }

      /* Modal */
      div[style*="minWidth:360"] {
        min-width: unset !important;
        width: 95vw !important;
        padding: 18px !important;
      }

      /* ── Dashboard ── */

      /* Stat cards: 2 per row */
      div[style*="minmax(200px,1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
        gap: 10px !important;
      }

      /* Financial overview + top items: stack vertically */
      div[style*="2fr 1fr"] {
        grid-template-columns: 1fr !important;
      }

      /* ── Inventory ── */

      /* Stat mini cards: 2 per row */
      div[style*="minmax(260px,1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Add item form fields: 2 per row */
      div[style*="minmax(200px,1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Edit row fields: 2 per row */
      div[style*="minmax(160px,1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Tables: allow horizontal scroll */
      div[style*="overflowX:'auto'"],
      div[style*="overflow:'auto'"] {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch !important;
      }

      table {
        font-size: 11px !important;
        min-width: 600px !important;
      }

      table th, table td {
        padding: 8px 8px !important;
      }

      /* ── Sales page ── */

      /* Sales history + cart: stack vertically */
      div[style*="1fr 340px"] {
        grid-template-columns: 1fr !important;
      }

      /* Cart becomes fixed bottom sheet above navbar */
      div[style*="position:'sticky'"][style*="top:80"] {
        position: static !important;
      }

      /* ── Reports ── */

      /* Report stat cards: 2 per row */
      div[style*="minmax(150px,1fr)"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* Report 3-column layout: stack */
      div[style*="1fr 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }

      /* ── Expenses ── */
      div[style*="2fr 1fr"][style*="gap:20"] {
        grid-template-columns: 1fr !important;
      }

      /* Expense form: stack vertically */
      div[style*="1fr 2fr 1fr"] {
        grid-template-columns: 1fr !important;
      }

      /* ── Users ── */
      div[style*="1fr 1fr 1fr 1fr"] {
        grid-template-columns: repeat(2, 1fr) !important;
      }

      /* ── Font scaling ── */
      h1, h2, h3 { font-size: 15px !important; }

      div[style*="fontSize:22"] { font-size: 18px !important; }
      div[style*="fontSize:18"] { font-size: 15px !important; }

      /* Topbar title */
      #main-content > div:first-child > div:first-child {
        font-size: 15px !important;
      }

      /* Hide date in topbar on mobile to save space */
      #main-content > div:first-child > div:last-child > div:last-child {
        display: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Loading screen (hidden once React mounts) -->
  <div id="loading">
    <div class="emoji">🌱</div>
    <h1>Agrovet Manager</h1>
    <p>Loading your business dashboard...</p>
  </div>

  <div id="root"></div>

  <script type="text/babel" data-presets="react" src="app.js?v=14.5"></script>

  <script>
    // Hide loading screen once React has rendered
    window.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var loading = document.getElementById('loading');
        if (loading) loading.style.display = 'none';
      }, 800);
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/project_M/sw.js');
      });
    }
  </script>
</body>
</html>
